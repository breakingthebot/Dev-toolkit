# .github/workflows/ci.yml
# Runs automated tests and packaging checks for pull requests and branch pushes.
# Connects to: pyproject.toml, tests/
# Created: 2026-06-12

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Build distributions
        run: python -m build
